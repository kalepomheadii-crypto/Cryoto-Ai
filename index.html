<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto AI</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: white;
      height: 100vh;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #16213e;
      padding: 20px;
      border-right: 1px solid #00ff9d;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #0f0f1a;
      padding: 15px 20px;
      border-bottom: 1px solid #00ff9d;
      text-align: center;
    }
    h1 {
      color: #00ff9d;
      margin: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #1a1a2e;
    }
    .message {
      margin: 15px 0;
      padding: 14px 18px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.5;
    }
    .user {
      background: #00ff9d;
      color: black;
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .ai {
      background: #16213e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 20px;
      background: #0f0f1a;
      border-top: 1px solid #00ff9d;
    }
    input {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      background: #16213e;
      border: 1px solid #00ff9d;
      color: white;
      border-radius: 8px;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      background: #00ff9d;
      color: black;
      border: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #00cc7a;
    }
    .prompt {
      padding: 10px;
      background: #1e2a4a;
      margin: 8px 0;
      border-radius: 8px;
      cursor: pointer;
    }
    .prompt:hover {
      background: #00ff9d;
      color: black;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h1>🚀 Crypto AI</h1>
      <p>Your Personal Crypto Assistant</p>
      
      <h3>Popular Prompts</h3>
      <div class="prompt" onclick="usePrompt('What is the current price and analysis of Bitcoin?')">📈 Bitcoin Analysis</div>
      <div class="prompt" onclick="usePrompt('Top 5 altcoins to watch this week')">🔥 Top Altcoins</div>
      <div class="prompt" onclick="usePrompt('How to keep my crypto wallet safe?')">🛡️ Wallet Security</div>
      <div class="prompt" onclick="usePrompt('Explain DeFi in simple terms')">📚 Explain DeFi</div>
      
      <button onclick="newChat()" style="margin-top: 30px;">New Chat</button>
    </div>

    <!-- Main Chat -->
    <div class="main">
      <div class="header">
        <h1>Crypto AI</h1>
      </div>
      <div class="messages" id="messages"></div>
      
      <div class="input-area">
        <input type="text" id="input" placeholder="Ask anything about crypto... (e.g. price of ETH)">
        <button onclick="sendMessage()">Send Message</button>
      </div>
    </div>
  </div>

  <script>
    const apiKey = "YOUR_GEMINI_API_KEY_HERE";   // ← Change this with your real key

    function addMessage(text, isUser) {
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
      msgDiv.textContent = text;
      document.getElementById("messages").appendChild(msgDiv);
      msgDiv.scrollIntoView({ behavior: "smooth" });
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, true);
      input.value = "";

      const thinking = document.createElement("div");
      thinking.className = "message ai";
      thinking.textContent = "Thinking...";
      document.getElementById("messages").appendChild(thinking);

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `You are Crypto AI, an expert crypto assistant. Be helpful, accurate and a bit fun. User: ${message}` }] }]
          })
        });

        const data = await response.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't respond right now.";
        
        document.getElementById("messages").removeChild(thinking);
        addMessage(reply, false);
      } catch (e) {
        document.getElementById("messages").removeChild(thinking);
        addMessage("Error connecting to AI. Check your API key.", false);
      }
    }

    function usePrompt(prompt) {
      document.getElementById("input").value = prompt;
      sendMessage();
    }

    function newChat() {
      document.getElementById("messages").innerHTML = "";
      addMessage("Hello! I'm Crypto AI 🚀 Ask me anything about crypto, trading, wallets, or market analysis!", false);
    }

    // Start the chat
    newChat();
  </script>
</body>
</html>
